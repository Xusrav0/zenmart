<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="../Public/CSS/command.css" />
    <link rel="stylesheet" href="../Public/CSS/practise.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Jost:ital,wght@0,100..900;1,100..900&family=Oswald:wght@200..700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="navbar_frame">
      <div class="container">
        <div class="navbar_top">
          <a href="../HomePage.html">
            <img src="../Public/Images/logo.svg" alt="" />
          </a>

          <div class="nav_search_frame">
            <div class="search_box">
              <div class="category_list">
                <select name="" id="">
                  <option value="All" selected>All Categories</option>
                  <option value="">Computers</option>
                </select>
              </div>
              <input type="text" placeholder="Search products..." />
            </div>
            <div class="search_icon_box">
              <img src="../Public/Images/search 1.svg" alt="" />
            </div>
          </div>
          <div class="nav_top_menu">
            <div class="top_menu_box">
              <div class="box_icon_box">
                <img src="../Public/Images/heart 1.svg" alt="" />
              </div>
              <div class="box_info_box">
                <span>Wishlist</span>
                <strong>My Items</strong>
              </div>
            </div>
            <div class="top_menu_box">
              <div class="box_icon_box">
                <img src="../Public/Images/profile 1.svg" alt="" />
              </div>
              <div class="box_info_box">
                <span>Sign in</span>
                <strong>Account</strong>
              </div>
            </div>
            <div class="top_menu_box">
              <div class="box_icon_box">
                <div class="basket_count">2</div>
                <img src="../Public/Images/shopping-cart 1.svg" alt="" />
              </div>
              <div class="box_info_box">
                <span>$299.99</span>
                <strong>Total</strong>
              </div>
            </div>
          </div>
        </div>
        <div class="navbar_bottom">
          <div class="navbar_bottom_menu_box">
            <div class="browse_box">
              <img src="../Public/Images/Group 44.svg" alt="" />
              <span>Browse Categories</span>
            </div>
            <div class="navbar_route_menu">
              <a href="" class="title">Home</a>
              <a href="">Shop</a>
              <a href="">Orders</a>
              <a href="">About</a>
              <a href="">Contact </a>
            </div>

            <div class="sorting_menu">
              <span>Deal of the Day</span>
              <span>Hot Deals</span>
              <span>Best Sellers</span>
              <span>New Arrivals</span>
            </div>
          </div>
        </div>
      </div>
    </div>
